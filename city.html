<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市线路 · 漫旅世界·中国</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/city.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <header class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">&#9772;</span>
        <span class="logo-text" data-i18n="logoText">漫旅世界·中国</span>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html#tours" data-i18n="navTours">热门线路</a>
        <a href="index.html#destinations" data-i18n="navDest">精选城市</a>
        <a href="index.html#about" data-i18n="navAbout">关于我们</a>
        <a href="index.html#reviews" data-i18n="navReviews">旅客评价</a>
        <a href="index.html#contact" class="btn-nav" data-i18n="navContact">定制行程</a>
      </nav>
      <div class="lang-dropdown" id="langSwitcher">
        <button class="lang-current" id="langDropdownBtn" aria-haspopup="listbox" aria-expanded="false">
          <svg class="lang-globe-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.4"/>
            <ellipse cx="10" cy="10" rx="3.5" ry="8.5" stroke="currentColor" stroke-width="1.4"/>
            <line x1="1.5" y1="7" x2="18.5" y2="7" stroke="currentColor" stroke-width="1.4"/>
            <line x1="1.5" y1="13" x2="18.5" y2="13" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <span id="langLabel">中文</span>
          <svg class="lang-chevron" viewBox="0 0 12 8" fill="none">
            <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul class="lang-options" id="langOptions" role="listbox">
          <li class="lang-option active" data-lang="zh" role="option">中文</li>
          <li class="lang-option" data-lang="en" role="option">English</li>
          <li class="lang-option" data-lang="es" role="option">Español</li>
        </ul>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===== 城市 Hero ===== -->
  <section class="city-hero" id="cityHero">
    <div class="city-hero-overlay"></div>
    <div class="city-hero-content">
      <a href="index.html" class="dest-back-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span data-i18n="backToHome">返回首页</span>
      </a>
      <p class="city-hero-tag" id="cityTag">DESTINATION</p>
      <h1 class="city-hero-title" id="cityName">城市名称</h1>
      <p class="city-hero-sub" id="citySub">城市简介</p>
    </div>
  </section>

  <!-- ===== 线路列表 ===== -->
  <section class="city-tours">
    <div class="container">
      <div class="section-header">
        <p class="section-tag" id="toursTag">TOURS</p>
        <h2 class="section-title" id="toursTitle">精选旅游线路</h2>
        <p class="section-desc" id="toursDesc">每条线路经过精心设计，融合经典景点与深度文化体验</p>
      </div>

      <!-- 筛选标签 -->
      <div class="city-filters" id="cityFilters"></div>

      <!-- 线路卡片网格 -->
      <div class="city-tours-grid" id="cityToursGrid">
        <div class="city-tour-skeleton"></div>
        <div class="city-tour-skeleton"></div>
        <div class="city-tour-skeleton"></div>
      </div>

      <!-- 无线路提示 -->
      <div class="city-empty" id="cityEmpty" style="display:none;">
        <p>暂无相关线路，请<a href="index.html#contact">联系我们</a>定制专属行程</p>
      </div>
    </div>
  </section>

  <!-- ===== 定制 CTA ===== -->
  <section class="city-cta">
    <div class="container city-cta-inner">
      <div>
        <h3 data-i18n="toursCtaText">没有找到心仪的线路？</h3>
        <p>告诉我们您的旅行梦想，我们将为您量身定制</p>
      </div>
      <a href="index.html#contact" class="btn btn-primary" data-i18n="toursCtaBtn">联系我们，量身定制</a>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="logo-icon">&#9772;</span>
        <span class="logo-text" data-i18n="logoText">漫旅世界·中国</span>
      </div>
      <p class="footer-copy">© 2024 ManTravel · 漫旅世界·中国. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/i18n.js"></script>
  <script src="js/city.js"></script>
</body>
</html>
