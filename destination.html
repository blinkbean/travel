<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>目的地详情 — 漫旅世界·中国 ManTravel</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/destination.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <header class="navbar" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">&#9772;</span>
        <span class="logo-text" data-i18n="logoText">漫旅世界·中国</span>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html#tours" data-i18n="navTours">热门线路</a>
        <a href="index.html#destinations" data-i18n="navDest">精选目的地</a>
        <a href="index.html#about" data-i18n="navAbout">关于我们</a>
        <a href="index.html#reviews" data-i18n="navReviews">旅客评价</a>
        <a href="index.html#contact" class="btn-nav" data-i18n="navContact">定制行程</a>
      </nav>
      <div class="lang-dropdown" id="langSwitcher">
        <button class="lang-current" id="langDropdownBtn" aria-haspopup="listbox" aria-expanded="false">
          <svg class="lang-globe-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.4"/>
            <ellipse cx="10" cy="10" rx="3.5" ry="8.5" stroke="currentColor" stroke-width="1.4"/>
            <line x1="1.5" y1="7" x2="18.5" y2="7" stroke="currentColor" stroke-width="1.4"/>
            <line x1="1.5" y1="13" x2="18.5" y2="13" stroke="currentColor" stroke-width="1.4"/>
          </svg>
          <span id="langLabel">中文</span>
          <svg class="lang-chevron" viewBox="0 0 12 8" fill="none">
            <path d="M1 1l5 5 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <ul class="lang-options" id="langOptions" role="listbox">
          <li class="lang-option active" data-lang="zh" role="option">中文</li>
          <li class="lang-option" data-lang="en" role="option">English</li>
          <li class="lang-option" data-lang="es" role="option">Español</li>
        </ul>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="菜单" data-i18n-aria="navAriaMenu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===== 加载中状态 ===== -->
  <div class="dest-detail-loading" id="destLoading">
    <div class="dest-detail-loading-hero dest-skeleton-block"></div>
    <div class="dest-detail-loading-body container">
      <div class="dest-skeleton-line" style="width:40%;height:2.5rem;margin-bottom:1rem;"></div>
      <div class="dest-skeleton-line" style="width:60%;height:1rem;margin-bottom:.6rem;"></div>
      <div class="dest-skeleton-line" style="width:55%;height:1rem;margin-bottom:.6rem;"></div>
      <div class="dest-skeleton-line" style="width:50%;height:1rem;"></div>
    </div>
  </div>

  <!-- ===== 错误状态 ===== -->
  <div class="dest-detail-error" id="destError" style="display:none;">
    <div class="dest-detail-error-inner">
      <p class="dest-detail-error-icon">🗺️</p>
      <h2>目的地未找到</h2>
      <p>抱歉，您访问的目的地页面不存在或尚未上线。</p>
      <a href="index.html#destinations" class="btn btn-primary">返回目的地列表</a>
    </div>
  </div>

  <!-- ===== 目的地详情内容 ===== -->
  <div id="destContent" style="display:none;">

    <!-- Hero -->
    <section class="dest-detail-hero">
      <div class="dest-detail-hero-bg" id="destHeroBg"></div>
      <div class="dest-detail-hero-overlay"></div>
      <div class="dest-detail-hero-content">
        <a href="index.html#destinations" class="dest-back-btn">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
            <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>返回目的地</span>
        </a>
        <h1 class="dest-detail-name" id="destHeroName"></h1>
        <p class="dest-detail-subtitle" id="destHeroSubtitle"></p>
      </div>
    </section>

    <!-- 正文内容区 -->
    <main class="dest-detail-main container" id="destMain">
      <!-- Markdown 内容占位，由 destination.js 动态填充 -->
      <div class="dest-md-skeleton" id="destMdSkeleton">
        <div class="dest-skeleton-line" style="width:80%;height:1.1rem;margin-bottom:.8rem;"></div>
        <div class="dest-skeleton-line" style="width:95%;height:1rem;margin-bottom:.6rem;"></div>
        <div class="dest-skeleton-line" style="width:90%;height:1rem;margin-bottom:.6rem;"></div>
        <div class="dest-skeleton-line" style="width:85%;height:1rem;margin-bottom:1.6rem;"></div>
        <div class="dest-skeleton-line" style="width:40%;height:1.4rem;margin-bottom:.8rem;"></div>
        <div class="dest-skeleton-line" style="width:92%;height:1rem;margin-bottom:.6rem;"></div>
        <div class="dest-skeleton-line" style="width:88%;height:1rem;margin-bottom:.6rem;"></div>
        <div class="dest-skeleton-line" style="width:70%;height:1rem;"></div>
      </div>
      <div class="dest-md-body" id="destMdBody"></div>
      <div class="dest-md-empty" id="destMdEmpty" style="display:none;">
        <p>内容正在编辑中，敬请期待…</p>
      </div>
    </main>

    <!-- CTA -->
    <section class="dest-detail-cta">
      <div class="container dest-detail-cta-inner">
        <h2 class="dest-detail-cta-title">准备好出发了吗？</h2>
        <p class="dest-detail-cta-desc">告诉我们您的旅行想法，我们将为您量身定制专属行程</p>
        <a href="index.html#contact" class="btn btn-primary">立即定制行程</a>
      </div>
    </section>

  </div>

  <!-- ===== 回到顶部 ===== -->
  <button class="back-to-top" id="backToTop" aria-label="回到顶部">&#8679;</button>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/destination.js"></script>
</body>
</html>
