<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="noticesPageTitle">通知公告 - 漫旅世界·中国</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/notice.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <header class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon">&#9772;</span>
        <span class="logo-text" data-i18n="logoText">漫旅世界·中国</span>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="index.html#tours" data-i18n="navTours">热门线路</a>
        <a href="index.html#destinations" data-i18n="navDest">精选目的地</a>
        <a href="index.html#about" data-i18n="navAbout">关于我们</a>
        <a href="index.html#reviews" data-i18n="navReviews">旅客评价</a>
        <a href="index.html#contact" class="btn-nav" data-i18n="navContact">定制行程</a>
      </nav>
      <div class="lang-dropdown" id="langSwitcher">
        <button class="lang-current" id="langDropdownBtn" aria-haspopup="listbox" aria-expanded="false">
          <svg class="lang-globe-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="8.5" stroke="currentColor" stroke-width="1.2"/>
            <ellipse cx="10" cy="10" rx="3.5" ry="8.5" stroke="currentColor" stroke-width="1.2"/>
            <line x1="1.5" y1="7" x2="18.5" y2="7" stroke="currentColor" stroke-width="1.2"/>
            <line x1="1.5" y1="13" x2="18.5" y2="13" stroke="currentColor" stroke-width="1.2"/>
          </svg>
          <span id="langLabel">中文</span>
        </button>
        <ul class="lang-options" id="langOptions" role="listbox">
          <li class="lang-option active" data-lang="zh" role="option">中文</li>
          <li class="lang-option" data-lang="en" role="option">English</li>
          <li class="lang-option" data-lang="es" role="option">Español</li>
        </ul>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="菜单" data-i18n-aria="navAriaMenu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ===== 页面 Hero ===== -->
  <section class="notice-hero">
    <div class="notice-hero-overlay"></div>
    <div class="notice-hero-content">
      <a href="index.html" class="dest-back-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
          <path d="M19 12H5M5 12l7-7M5 12l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span data-i18n="backToHome">返回首页</span>
      </a>
      <p class="section-tag">NOTICE</p>
      <h1 class="notice-hero-title" data-i18n="noticesTitle">通知公告</h1>
      <p class="notice-hero-desc" data-i18n="noticesDesc">最新活动资讯与重要通知，请及时查阅</p>
    </div>
  </section>

  <!-- ===== 公告列表 ===== -->
  <section class="notice-section">
    <div class="container">
      <div id="noticeList" class="notice-list" aria-live="polite">
        <div class="notice-card notice-skeleton"></div>
        <div class="notice-card notice-skeleton"></div>
        <div class="notice-card notice-skeleton"></div>
      </div>
      <div id="noticeEmpty" class="notice-empty" style="display:none;">
        <p data-i18n="noticesEmpty">暂无公告内容</p>
      </div>
    </div>
  </section>

  <!-- ===== 页脚 ===== -->
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <span class="logo-icon">&#9772;</span>
        <span class="footer-logo-text" data-i18n="logoText">漫旅世界·中国</span>
        <p data-i18n-html="footerBrand">让每一次旅行<br>都成为生命中最美的故事</p>
      </div>
      <div class="footer-contact">
        <h4 data-i18n="footerContactTitle">联系方式</h4>
        <p>travel@mantravel.cn</p>
        <p>+86 138 0000 1234</p>
        <p data-i18n="footerAddr">北京市朝阳区建国路 88 号</p>
        <div class="footer-social">
          <a href="#" aria-label="微信">微信</a>
          <a href="#" aria-label="微博">微博</a>
          <a href="#" aria-label="抖音">抖音</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <p data-i18n="footerCopy">© 2025 漫旅世界·中国 ManTravel. 保留所有权利.</p>
    </div>
  </footer>

  <button class="back-to-top" id="backToTop" aria-label="回到顶部">↑</button>

  <script src="js/i18n.js"></script>
  <script src="js/notices.js"></script>
  <script>
    // 导航滚动效果
    var navbar = document.getElementById('navbar');
    window.addEventListener('scroll', function () {
      navbar.classList.toggle('scrolled', window.scrollY > 50);
    });
    // 移动端菜单
    document.getElementById('navToggle').addEventListener('click', function () {
      document.getElementById('navLinks').classList.toggle('open');
    });
    // 回到顶部
    var btn = document.getElementById('backToTop');
    window.addEventListener('scroll', function () {
      btn.classList.toggle('visible', window.scrollY > 400);
    });
    btn.addEventListener('click', function () { window.scrollTo({ top: 0, behavior: 'smooth' }); });
  </script>
  <script>
    // i18n for notices page
    (function () {
      var LANG_KEY = 'mantravel_lang';
      var currentLang = localStorage.getItem(LANG_KEY) || 'zh';
      var LANG_LABELS = { zh: '中文', en: 'English', es: 'Español' };

      function applyTranslations(lang) {
        var t = (typeof TRANSLATIONS !== 'undefined') && TRANSLATIONS[lang];
        if (!t) return;
        document.querySelectorAll('[data-i18n]').forEach(function (el) {
          var key = el.getAttribute('data-i18n');
          if (t[key] !== undefined) el.textContent = t[key];
        });
        document.querySelectorAll('[data-i18n-html]').forEach(function (el) {
          var key = el.getAttribute('data-i18n-html');
          if (t[key] !== undefined) el.innerHTML = t[key];
        });
        document.querySelectorAll('[data-i18n-aria]').forEach(function (el) {
          var key = el.getAttribute('data-i18n-aria');
          if (t[key] !== undefined) el.setAttribute('aria-label', t[key]);
        });
        if (t.noticesPageTitle) document.title = t.noticesPageTitle;
        var langMap = { zh: 'zh-CN', en: 'en', es: 'es' };
        document.documentElement.lang = langMap[lang] || lang;
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
      }

      function updateLangUI(lang) {
        var label = document.getElementById('langLabel');
        if (label) label.textContent = LANG_LABELS[lang] || lang;
        document.querySelectorAll('.lang-option').forEach(function (opt) {
          opt.classList.toggle('active', opt.getAttribute('data-lang') === lang);
        });
        var btn = document.getElementById('langDropdownBtn');
        if (btn) btn.setAttribute('aria-expanded', 'false');
        var dropdown = document.getElementById('langSwitcher');
        if (dropdown) dropdown.classList.remove('open');
      }

      function setLang(lang) {
        applyTranslations(lang);
        updateLangUI(lang);
      }

      var langBtn = document.getElementById('langDropdownBtn');
      langBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        var sw = document.getElementById('langSwitcher');
        var expanded = sw.classList.toggle('open');
        langBtn.setAttribute('aria-expanded', String(expanded));
      });
      document.querySelectorAll('.lang-option').forEach(function (opt) {
        opt.addEventListener('click', function () { setLang(opt.getAttribute('data-lang')); });
      });
      document.addEventListener('click', function () {
        var sw = document.getElementById('langSwitcher');
        if (sw) { sw.classList.remove('open'); langBtn.setAttribute('aria-expanded', 'false'); }
      });

      setLang(currentLang);
    })();
  </script>
</body>
</html>
